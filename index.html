<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국 통합 라디오 플레이어</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { font-size: 24px; color: #0056b3; margin-bottom: 20px; }
        select { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #ccc; background-color: #fff; }
        video { width: 100%; height: 50px; background: #222; border-radius: 6px; margin-bottom: 10px; }
        .btn-box { margin-top: 15px; }
        .btn { display: block; padding: 12px; background-color: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: background 0.2s; }
        .btn:hover { background-color: #0056b3; }
        .btn-disabled { background-color: #ccc; pointer-events: none; }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 6px; font-size: 12px; text-align: left; margin-top: 25px; word-break: break-all; border-left: 4px solid #007bff; }
    </style>
</head>
<body>

<div class="container">
    <h1>📻 한국 통합 라디오 플레이어</h1>
    
    <select id="channel-selector">
        <option value="">데이터를 불러오는 중입니다...</option>
    </select>

    <video id="video" controls autoplay></video>

    <div class="btn-box">
        <a id="pls-download" href="#" class="btn btn-disabled" download>⬇️ 현재 채널 PLS 다운로드 (PC용)</a>
    </div>

    <div class="info-box">
        <strong>💡 외부 플레이어(VLC, 팟플레이어 등) 고정 주소:</strong><br>
        <span id="pls-url" style="color:#d9534f; font-weight:bold;">채널을 선택해주세요.</span>
        <br><br>
        <strong>🔗 현재 원본 주소 (m3u8/aac):</strong><br>
        <span id="stream-url-text" style="color:#555;">채널을 선택해주세요.</span>
    </div>
</div>

<script>
    const selector = document.getElementById('channel-selector');
    const video = document.getElementById('video');
    const streamUrlText = document.getElementById('stream-url-text');
    const plsDownload = document.getElementById('pls-download');
    const plsUrlText = document.getElementById('pls-url');
    let hls;

    // 로컬 PC에서 직접 실행했는지 검사
    if (window.location.protocol === 'file:') {
        selector.innerHTML = '<option value="">❌ 로컬 PC에서는 실행 불가. GitHub Pages 주소로 접속하세요.</option>';
    } else {
        // 외부 JSON 파일에서 실시간 채널 데이터 불러오기
        fetch('channels.json?t=' + new Date().getTime())
            .then(response => {
                if (response.status === 404) {
                    throw new Error("404: channels.json 파일이 아직 생성되지 않았습니다.");
                }
                if (!response.ok) throw new Error("네트워크 응답 오류");
                return response.json();
            })
            .then(channelData => {
                window.channelData = channelData;
                selector.innerHTML = '<option value="">듣고 싶은 채널을 선택하세요</option>';
                
                for (const [id, data] of Object.entries(channelData)) {
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = data.name;
                    selector.appendChild(option);
                }
            })
            .catch(error => {
                selector.innerHTML = '<option value="">❌ 데이터 오류 (Actions 실행 여부를 확인하세요)</option>';
                console.error('채널 데이터 Fetch 오류:', error);
            });
    }

    const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');

    selector.addEventListener('change', (event) => {
        const channelId = event.target.value;
        
        if (!channelId || !window.channelData) {
            video.pause();
            streamUrlText.innerText = "채널을 선택해주세요.";
            plsUrlText.innerText = "채널을 선택해주세요.";
            plsDownload.classList.add('btn-disabled');
            plsDownload.href = "#";
            return;
        }

        const channelInfo = window.channelData[channelId];
        const streamUrl = channelInfo.url;
        const plsFileName = `${channelId}.pls`;

        streamUrlText.innerText = streamUrl;
        plsUrlText.innerText = baseUrl + plsFileName;
        plsDownload.href = plsFileName;
        plsDownload.classList.remove('btn-disabled');

        if (Hls.isSupported() && streamUrl.includes('.m3u8')) {
            if (hls) { hls.destroy(); }
            hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
        } else {
            if (hls) { hls.destroy(); }
            video.src = streamUrl;
            video.play();
        }
    });
</script>

</body>
</html>
